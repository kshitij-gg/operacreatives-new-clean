<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opera Creatives</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Prevent white flash: body starts hidden, revealed by JS -->
    <style>body { opacity: 0; }</style>
</head>
<body>
    <!-- Splash Screen: The Grand Overture (Premium) -->
    <div id="splash">
        <!-- Dual-layer spotlight glow -->
        <div class="splash-spotlight"></div>
        <div class="splash-spotlight-halo"></div>

        <!-- Subtle grain texture overlay -->
        <div class="splash-grain"></div>

        <!-- Ornamental corner frames -->
        <div class="corner corner-tl">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 2 L2 50" stroke="#c4a882" stroke-width="0.8" opacity="0.6"/>
                <path d="M2 2 L50 2" stroke="#c4a882" stroke-width="0.8" opacity="0.6"/>
                <path d="M2 2 L20 20" stroke="#c4a882" stroke-width="0.4" opacity="0.35"/>
                <circle cx="2" cy="2" r="1.8" fill="#c4a882" opacity="0.5"/>
                <circle cx="26" cy="2" r="1" fill="#c4a882" opacity="0.25"/>
                <circle cx="2" cy="26" r="1" fill="#c4a882" opacity="0.25"/>
                <path d="M16 2 Q22 16 2 16" stroke="#c4a882" stroke-width="0.4" fill="none" opacity="0.3"/>
                <path d="M2 8 Q8 8 8 2" stroke="#c4a882" stroke-width="0.3" fill="none" opacity="0.2"/>
            </svg>
        </div>
        <div class="corner corner-tr">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M98 2 L98 50" stroke="#c4a882" stroke-width="0.8" opacity="0.6"/>
                <path d="M98 2 L50 2" stroke="#c4a882" stroke-width="0.8" opacity="0.6"/>
                <path d="M98 2 L80 20" stroke="#c4a882" stroke-width="0.4" opacity="0.35"/>
                <circle cx="98" cy="2" r="1.8" fill="#c4a882" opacity="0.5"/>
                <circle cx="74" cy="2" r="1" fill="#c4a882" opacity="0.25"/>
                <circle cx="98" cy="26" r="1" fill="#c4a882" opacity="0.25"/>
                <path d="M84 2 Q78 16 98 16" stroke="#c4a882" stroke-width="0.4" fill="none" opacity="0.3"/>
                <path d="M98 8 Q92 8 92 2" stroke="#c4a882" stroke-width="0.3" fill="none" opacity="0.2"/>
            </svg>
        </div>
        <div class="corner corner-bl">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 98 L2 50" stroke="#c4a882" stroke-width="0.8" opacity="0.6"/>
                <path d="M2 98 L50 98" stroke="#c4a882" stroke-width="0.8" opacity="0.6"/>
                <path d="M2 98 L20 80" stroke="#c4a882" stroke-width="0.4" opacity="0.35"/>
                <circle cx="2" cy="98" r="1.8" fill="#c4a882" opacity="0.5"/>
                <circle cx="26" cy="98" r="1" fill="#c4a882" opacity="0.25"/>
                <circle cx="2" cy="74" r="1" fill="#c4a882" opacity="0.25"/>
                <path d="M16 98 Q22 84 2 84" stroke="#c4a882" stroke-width="0.4" fill="none" opacity="0.3"/>
                <path d="M2 92 Q8 92 8 98" stroke="#c4a882" stroke-width="0.3" fill="none" opacity="0.2"/>
            </svg>
        </div>
        <div class="corner corner-br">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M98 98 L98 50" stroke="#c4a882" stroke-width="0.8" opacity="0.6"/>
                <path d="M98 98 L50 98" stroke="#c4a882" stroke-width="0.8" opacity="0.6"/>
                <path d="M98 98 L80 80" stroke="#c4a882" stroke-width="0.4" opacity="0.35"/>
                <circle cx="98" cy="98" r="1.8" fill="#c4a882" opacity="0.5"/>
                <circle cx="74" cy="98" r="1" fill="#c4a882" opacity="0.25"/>
                <circle cx="98" cy="74" r="1" fill="#c4a882" opacity="0.25"/>
                <path d="M84 98 Q78 84 98 84" stroke="#c4a882" stroke-width="0.4" fill="none" opacity="0.3"/>
                <path d="M98 92 Q92 92 92 98" stroke="#c4a882" stroke-width="0.3" fill="none" opacity="0.2"/>
            </svg>
        </div>

        <!-- Center content -->
        <div class="splash-content">
            <h1 class="splash-logo">
                <em>Opera</em><br><span>CREATIVES</span>
            </h1>
            <div class="splash-divider">
                <span class="divider-line"></span>
                <span class="divider-diamond">◆</span>
                <span class="divider-line"></span>
            </div>
            <p class="splash-tagline">The art of the ad, with the speed of AI.</p>
        </div>

        <!-- Skip button -->
        <button class="splash-skip" id="splashSkip">Skip ›</button>
    </div>

    <div class="overlay"></div>

    <!-- Film grain texture on main site -->
    <div class="site-grain"></div>

    <!-- OPERA Watermark (#6) -->
    <div class="opera-watermark" aria-hidden="true">OPERA</div>

    <!-- Parallax depth layers (#3) -->
    <div class="parallax-mid" id="parallaxMid"></div>
    <div class="parallax-far" id="parallaxFar"></div>

    <!-- Ambient light leak (#1) -->
    <div class="light-leak" aria-hidden="true"></div>

    <!-- Top accent line (#2) -->
    <div class="accent-line accent-line-top" id="accentTop"></div>

    <!-- Bokeh particles canvas -->
    <canvas id="bokehCanvas"></canvas>
    
    <nav class="navbar">
        <div class="logo"><span class="logo-opera">Opera</span> <span class="logo-creatives">CREATIVES</span></div>
        <a href="mailto:hello@operacreatives.com" class="btn btn-outline" data-magnetic>EMAIL US</a>
    </nav>

    <!-- Footer: Social Icons + Copyright -->
    <footer class="site-footer" id="siteFooter">
        <div class="footer-socials">
            <!-- Instagram -->
            <a href="https://instagram.com/operacreatives_" target="_blank" rel="noopener" class="social-link" aria-label="Instagram" data-magnetic>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                    <circle cx="12" cy="12" r="4"/>
                    <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
                </svg>
            </a>
            <!-- X / Twitter -->
            <a href="https://x.com/operacreatives_" target="_blank" rel="noopener" class="social-link" aria-label="X (Twitter)" data-magnetic>
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
            </a>
            <!-- YouTube -->
            <a href="https://youtube.com/@operacreatives" target="_blank" rel="noopener" class="social-link" aria-label="YouTube" data-magnetic>
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                </svg>
            </a>
            <!-- LinkedIn -->
            <a href="http://linkedin.com/company/operacreatives" target="_blank" rel="noopener" class="social-link" aria-label="LinkedIn" data-magnetic>
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                </svg>
            </a>
            <!-- Email -->
            <a href="mailto:hello@operacreatives.com" class="social-link" aria-label="Email" data-magnetic>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                    <polyline points="2,4 12,13 22,4"/>
                </svg>
            </a>
        </div>
        <p class="footer-copy">© 2026 Opera Creatives. All Rights Reserved.</p>
    </footer>

    <!-- Timeline bar (#D) -->
    <div class="timeline-bar" id="timelineBar"><div class="timeline-fill"></div></div>

    <!-- Link bloom shutter (#2) -->
    <div class="page-bloom" id="pageBloom"></div>



    <!-- Easter egg overlay (#8) -->
    <div class="easter-egg-overlay" id="easterEgg" aria-hidden="true">
        <div class="ee-spotlight"></div>
        <div class="ee-logo">
            <em>Opera</em>
            <span>CREATIVES</span>
        </div>
        <p class="ee-hint">✦ you found the secret ✦</p>
    </div>

    <main class="hero-content">
        <!-- Center Text Group (Fades out when booking) -->
        <div class="hero-intro-text" id="heroIntroText">
            <h1 class="headline">
                <span class="line1">
                    <span class="word">Every</span>
                    <span class="word">brand</span>
                    <span class="word">deserves</span>
                    <span class="word">a</span>
                </span>
                <span class="line2">
                    <span class="word">standing</span>
                    <span class="word">ovation.</span>
                </span>
            </h1>
            <p class="subtext" id="subtextTyper"></p>
            <button class="btn btn-primary reveal" id="btnBookCall" data-magnetic>BOOK A CALL</button>
        </div>

        <!-- Embedded Booking Form (Hidden initially) -->
        <div class="booking-form-wrapper" id="bookingFormWrapper">
            <div class="booking-frame">
                <button class="close-form" id="btnCloseForm" aria-label="Close" data-magnetic>
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
                <h2 class="booking-title"><em>Tell us your</em><br>VISION</h2>
                <div class="booking-divider">
                    <span class="divider-line"></span>
                    <span class="divider-diamond">◆</span>
                    <span class="divider-line"></span>
                </div>
                <form class="luxury-form" onsubmit="event.preventDefault();">
                    <div class="form-group">
                        <input type="text" id="formName" class="form-input" placeholder=" " required>
                        <label for="formName" class="form-label">Name</label>
                    </div>
                    <div class="form-group">
                        <input type="email" id="formEmail" class="form-input" placeholder=" " required>
                        <label for="formEmail" class="form-label">Email</label>
                    </div>
                    <div class="form-group">
                        <textarea id="formVision" class="form-input form-textarea" placeholder=" " required></textarea>
                        <label for="formVision" class="form-label">Briefly describe your brand</label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-submit-form" data-magnetic>REQUEST INVITATION</button>
                </form>
            </div>
        </div>
    </main>

    <script src="effects.js"></script>
</body>
</html>
